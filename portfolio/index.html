<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/style.css">
  <title>Developer Lim</title>
</head>

<body>
  <header data-include-file="/components/header.html" class="include"></header>
  <main>
    <h1>포트폴리오</h1>
    <ul id="portfolio-list"></ul>
  </main>
  <script>
    fetch('portfolio.json') // JSON 파일 경로
      .then(response => response.json())
      .then(data => {
        const portfolioList = document.getElementById('portfolio-list');

        data.forEach(item => {
          const listItem = document.createElement('li');

          const title = document.createElement('div');
          title.textContent = item.title;

          const createdAt = document.createElement('div');
          createdAt.textContent = item.created_at;

          const labelsContainer = document.createElement('div');
          labelsContainer.classList.add('labels-container');

          item.labels.forEach(label => {
            const labelDiv = document.createElement('div');
            labelDiv.textContent = label.name;
            labelDiv.style.backgroundColor = `#${label.color}`;
            labelDiv.style.color = getTextColor(label.color);
            labelsContainer.appendChild(labelDiv);
          });

          listItem.appendChild(title);
          listItem.appendChild(createdAt);
          listItem.appendChild(labelsContainer);

          portfolioList.appendChild(listItem);
        });
      })
      .catch(error => console.error('Error fetching data:', error));

    function getTextColor(color) {
      color = color.slice(1);
      const r = parseInt(color.substring(0, 2), 16);
      const g = parseInt(color.substring(2, 4), 16);
      const b = parseInt(color.substring(4, 6), 16);
      const brightness = (0.2126 * r + 0.7152 * g + 0.0722 * b);

      return brightness < 128 ? '#ffffff' : '#000000';
    }
  </script>

  <script src="/include.js"></script>
</body>

</html>
